<?xml version="1.0" encoding="UTF-8"?>
<!--
  Placeholder hero for the VPD1 investment-call aktualita.
  Design language lifted from /projekty/vpd/ (SVGPattern diagonal lines, monochrome).
  Replace with a real rendering of Horni kasarna Klecany once VPD Klecany s.r.o. provides one.
  Target aspect ratio 16:9 (1600x900). Monochrome so it survives the Aktuality detail hero's darkening filter.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img">
  <title>VPD1 - schematicky pohled na Horni kasarna Klecany</title>
  <defs>
    <pattern id="osaDiag" patternUnits="userSpaceOnUse" width="14" height="24.25">
      <path d="M0,0 L14,24.25" stroke="#9a9a9a" stroke-width="1" fill="none" opacity="0.32"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#0d0d0d"/>
  <rect width="1600" height="900" fill="url(#osaDiag)"/>

  <!-- thin frame, 40px from each edge -->
  <rect x="40" y="40" width="1520" height="820" fill="none" stroke="#525252" stroke-width="1"/>

  <!-- top-left eyebrow -->
  <g font-family="system-ui, -apple-system, sans-serif" font-weight="600">
    <text x="80" y="100" font-size="14" fill="#d4d4d4" letter-spacing="3">VPD1</text>
    <text x="80" y="124" font-size="11" fill="#808080" letter-spacing="1.8" font-weight="500">INVESTMENT CALL</text>
  </g>

  <!-- center title block -->
  <g text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">
    <text x="800" y="420" font-size="66" font-weight="600" fill="#ffffff" letter-spacing="-1.2">Horni kasarna Klecany</text>
    <text x="800" y="470" font-size="22" font-weight="500" fill="#c4c4c4" letter-spacing="0.2">83 327 m² na prahu metropole</text>
  </g>

  <!-- schematic site perimeter, understated -->
  <g fill="none" stroke="#6e6e6e" stroke-width="1.2" opacity="0.55">
    <rect x="260" y="560" width="1080" height="180"/>
    <line x1="600" y1="560" x2="600" y2="740"/>
    <line x1="1000" y1="560" x2="1000" y2="740"/>
    <line x1="260" y1="650" x2="1340" y2="650"/>
  </g>

  <!-- bottom corner meta -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#757575" letter-spacing="1.4">
    <text x="80" y="820">50.17°N · 14.41°E</text>
    <text x="1520" y="820" text-anchor="end">12 KM OD CENTRA PRAHY</text>
  </g>
</svg>
